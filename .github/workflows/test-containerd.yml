name: Test containerd image store on GitHub Actions

on: [push]

jobs:
  test-with-containerd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker with containerd image store
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Verify Storage Driver
        run: docker info | grep -i "Storage Driver"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build with provenance and SBOM (no --push)
        run: |
          docker build \
            --provenance=mode=max \
            --sbom=true \
            -t ajeetraina777/python-dhi:test .

      - name: Install Docker Scout CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s -- -b /usr/local/bin
          echo "/usr/local/bin" >> $GITHUB_PATH
          docker-scout version
          
      - name: Scan with Docker Scout
        continue-on-error: true
        run: |
          docker-scout cves mytest/python-dhi:test 2>&1 | tee scout-with-containerd.txt
          echo "=== Full Scout Output ==="
          cat scout-with-containerd.txt
          echo "=== Checking for attestations ==="
          grep -i "attestation\|VEX\|provenance\|SBOM" scout-with-containerd.txt || echo "No attestation lines found"

      - name: Push only if scan passes
        run: docker push mytest/python-dhi:test

  test-without-containerd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Verify Storage Driver (default)
        run: docker info | grep -i "Storage Driver"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build with provenance and SBOM (no --push)
        run: |
          docker build \
            --provenance=mode=max \
            --sbom=true \
            -t mytest/python-dhi:test .

      - name: Install Docker Scout CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan with Docker Scout
        run: |
          docker scout cves ajeetraina777/python-dhi:test 2>&1 | tee scout-with-containerd.txt
          echo "--- Scout output ---"
          cat scout-with-containerd.txt
          echo "--- Checking for attestations ---"
          grep -i "attestation\|VEX\|provenance\|SBOM" scout-with-containerd.txt || echo "No attestation lines found"

      - name: Push only if scan passes
        run: docker push ajeetraina777/python-dhi:test
